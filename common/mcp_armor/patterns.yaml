  - name: "twilio_auth_token"
    pattern: "(?i)twilio[\\s_-]?auth[\\s_-]?token[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9\\-]{20,})"
    replacement: "[REDACTED]"
    enabled: true

  # ─── Auth providers extended ───────────────────────────────────────────────
