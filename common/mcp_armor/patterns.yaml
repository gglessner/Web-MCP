  # ─── Environment variables (^ anchor + MULTILINE) ──────────────────────────
  - name: "env_password_var"
    pattern: "(?i)^(?:PASSWORD|PASSWD|PWD|SECRET|API_KEY|TOKEN|AUTH|PRIVATE|KEY)[ \\t]*=[ \\t]*(?P<secret>\\S+)"
