    replacement: "[REDACTED]"
    enabled: true

  # ─── Webhooks ──────────────────────────────────────────────────────────────
  - name: "slack_incoming_webhook"
    pattern: "https://hooks\\.slack\\.com/services/T[a-zA-Z0-9_]+/B[a-zA-Z0-9_]+/[a-zA-Z0-9_]+"
    replacement: "[REDACTED]"
    enabled: true

  - name: "feishu_webhook"
