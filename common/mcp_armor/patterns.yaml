  - name: "okta_api_token"
    pattern: "(?i)okta[\\s_-]?(?:api[\\s_-]?token|api[\\s_-]?key)[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9\\-\\.]{20,})"
    replacement: "[REDACTED]"
    enabled: true

  # ─── Generic high-entropy ──────────────────────────────────────────────────
  - name: "generic_hex_secret"
    pattern: "(?i)(?:secret|token|key|auth|password|passwd)[ \\t]*[:=][ \\t]*(?P<secret>[a-f0-9]{32,})"
    replacement: "[REDACTED]"
