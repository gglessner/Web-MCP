    enabled: true

  # ─── Cloud storage ─────────────────────────────────────────────────────────
  - name: "minio_access_key"
    pattern: "(?i)minio[\\s_-]?access[\\s_-]?key[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9\\-]{20,})"
    replacement: "[REDACTED]"
