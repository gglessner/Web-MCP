  - name: "npm_token"
    pattern: "npm_[A-Za-z0-9]{36}"
    replacement: "[REDACTED]"
    enabled: true

  - name: "heroku_api_key"
    pattern: "[hH]eroku[\\s_-]?[aA][pP][iI][\\s_-]?[kK][eE][yY][ \\t]*[:=][ \\t]*(?P<secret>[a-f0-9]{32})"
    replacement: "[REDACTED]"
    enabled: true

  - name: "github_app_client_secret"
    pattern: "(?i)(?:app_client_secret|github_app_secret)[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9_\\-]{20,})"
