# MCP Content Filter Configuration
#
# Patterns use a named capture group (?P<secret>...) to mark which span is
# redacted. Everything outside that group (labels, separators, scheme) is
# preserved. Patterns without a 'secret' group redact the entire match —
# use this for standalone tokens (ghp_..., AKIA..., etc.) where the whole
# string IS the secret.
#
# Whitespace between separators and values is restricted to [ \t]* (space
# and tab only). This prevents patterns from jumping newlines and consuming
# the next line when a value is empty.
#
# All patterns are compiled with re.MULTILINE, so ^ and $ match line
# boundaries, not just string boundaries.

# Logging settings
log_requests: true
log_responses: true
log_file: "mcp_filter.log"
dry_run: false

# Dict-key patterns. If a key matches one of these regexes and its value is
# a string, the entire value is replaced with [REDACTED] — no text-pattern
# matching needed. Suffix forms catch service-prefixed names like
# aws_secret, db_password.
sensitive_keys:
  - "(?i)^(password|passwd|pwd|secret|token|auth|api[_-]?key|access[_-]?key|private[_-]?key|client[_-]?secret|.*_secret|.*_token|.*_password|.*_key)$"

patterns:
  # ─── Generic password / API key=value ──────────────────────────────────────
  - name: "password_key_value"
    pattern: "(?i)(?:password|passwd|pwd)[ \\t]*[:=][ \\t]*(?P<secret>\\S+)"
    replacement: "[REDACTED]"
    enabled: true

  - name: "password_json"
    pattern: "(?i)[\"'](?:password|passwd|pwd|secret)[\"'][ \\t]*:[ \\t]*[\"'](?P<secret>[^\"']+)[\"']"
    replacement: "[REDACTED]"
    enabled: true

  - name: "password_in_url"
    pattern: "(?i)(?:password|pwd|pass)=(?P<secret>[^&\\s]+)"
    replacement: "[REDACTED]"
    enabled: true

  - name: "api_key"
    pattern: "(?i)(?:api_key|apikey|api-key)[ \\t]*[:=][ \\t]*(?P<secret>\\S+)"
    replacement: "[REDACTED]"
    enabled: true

  - name: "client_id"
    pattern: "(?i)(?:client_id|clientid)[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9\\-_]{20,})"
    replacement: "[REDACTED]"
    enabled: true

  - name: "client_secret"
    pattern: "(?i)(?:client_secret|app_secret|service_secret)[ \\t]*[:=][ \\t]*(?P<secret>\\S+)"
    replacement: "[REDACTED]"
    enabled: true

  - name: "auth_token"
    pattern: "(?i)(?:token|auth_token|access_token|refresh_token)[ \\t]*[:=][ \\t]*(?P<secret>\\S+)"
    replacement: "[REDACTED]"
    enabled: true

  # ─── GitHub tokens (standalone — whole match is the secret) ────────────────
  - name: "github_personal_token"
    pattern: "ghp_[A-Za-z0-9]{36,}"
    replacement: "[REDACTED]"
    enabled: true

  - name: "github_oauth_token"
    pattern: "gho_[A-Za-z0-9]{36,}"
    replacement: "[REDACTED]"
    enabled: true

  - name: "github_user_server_token"
    pattern: "ghu_[A-Za-z0-9]{36,}"
    replacement: "[REDACTED]"
    enabled: true

  - name: "github_server_oauth_token"
    pattern: "ghs_[A-Za-z0-9]{36,}"
    replacement: "[REDACTED]"
    enabled: true

  - name: "github_refresh_token"
    pattern: "ghr_[A-Za-z0-9]{36,}"
    replacement: "[REDACTED]"
    enabled: true

  # ─── AWS ───────────────────────────────────────────────────────────────────
  - name: "aws_access_key"
    pattern: "AKIA[0-9A-Z]{16}"
    replacement: "[REDACTED]"
    enabled: true

  - name: "aws_secret_key"
    pattern: "(?i)aws_secret_access_key[ \\t]*[:=][ \\t]*(?P<secret>\\S+)"
    replacement: "[REDACTED]"
    enabled: true

  - name: "aws_session_token"
    pattern: "(?i)aws_session_token[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9+/=]{200,})"
    replacement: "[REDACTED]"
    enabled: true

  # ─── Azure ─────────────────────────────────────────────────────────────────
  - name: "azure_client_secret"
    pattern: "(?i)(?:azure_client_secret|az_client_secret)[ \\t]*[:=][ \\t]*(?P<secret>\\S+)"
    replacement: "[REDACTED]"
    enabled: true

  - name: "azure_storage_key"
    pattern: "(?i)azure_storage_key[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9+/=]{80,})"
    replacement: "[REDACTED]"
    enabled: true

  - name: "azure_connection_string"
    pattern: "DefaultEndpointsProtocol=https;AccountName=[^;\\s]+;AccountKey=(?P<secret>[^;\\s]+)"
    replacement: "[REDACTED]"
    enabled: true

  # ─── Google Cloud ──────────────────────────────────────────────────────────
  - name: "google_api_key"
    pattern: "AIza[\\-_A-Za-z0-9]{35}"
    replacement: "[REDACTED]"
    enabled: true

  - name: "google_oauth_client"
    pattern: "[0-9]+-[A-Za-z0-9_]{32}\\.apps\\.googleusercontent\\.com"
    replacement: "[REDACTED]"
    enabled: true

  - name: "google_private_key"
    pattern: "-----BEGIN PRIVATE KEY-----[\\s\\S]+?-----END PRIVATE KEY-----"
    replacement: "[REDACTED]"
    enabled: true

  # ─── Certificates / SSH ────────────────────────────────────────────────────
  - name: "cert_password"
    pattern: "(?i)(?:cert_password|key_password|private_key_passphrase|pfx_password|keystore_password)[ \\t]*[:=][ \\t]*(?P<secret>\\S+)"
    replacement: "[REDACTED]"
    enabled: true

  - name: "ssh_private_key"
    pattern: "-----BEGIN[ \\t]+(?:RSA[ \\t]+|DSA[ \\t]+|EC[ \\t]+|OPENSSH[ \\t]+)?PRIVATE[ \\t]+KEY-----"
    replacement: "[REDACTED]"
    enabled: true

  - name: "ssh_ed25519_key"
    pattern: "-----BEGIN OPENSSH[ \\t]+PRIVATE[ \\t]+KEY-----"
    replacement: "[REDACTED]"
    enabled: true

  # ─── JWT (dots are literal — defect #8 fix) ────────────────────────────────
  - name: "jwt_token"
    pattern: "eyJ[A-Za-z0-9_-]+\\.eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
    replacement: "[REDACTED]"
    enabled: true

  # ─── HTTP auth ─────────────────────────────────────────────────────────────
  - name: "bearer_token"
    pattern: "Bearer[ \\t]+(?P<secret>[A-Za-z0-9_\\-\\.!]+)"
    replacement: "[REDACTED]"
    enabled: true

  - name: "basic_auth"
    pattern: "Basic[ \\t]+(?P<secret>[A-Za-z0-9+/=]+)"
    replacement: "[REDACTED]"
    enabled: true

  # ─── Database connection strings ───────────────────────────────────────────
  - name: "postgresql_connection"
    pattern: "(?i)postgresql://[^:\\s]+:(?P<secret>[^@\\s]+)@"
    replacement: "[REDACTED]"
    enabled: true

  - name: "mysql_connection"
    pattern: "(?i)mysql://[^:\\s]+:(?P<secret>[^@\\s]+)@"
    replacement: "[REDACTED]"
    enabled: true

  - name: "mongodb_connection"
    pattern: "(?i)mongodb(?:\\+srv)?://[^:\\s]+:(?P<secret>[^@\\s]+)@"
    replacement: "[REDACTED]"
    enabled: true

  - name: "redis_connection"
    pattern: "(?i)redis://[^:\\s]+:(?P<secret>[^@\\s]+)@"
    replacement: "[REDACTED]"
    enabled: true

  - name: "jdbc_connection"
    pattern: "(?i)jdbc:[^:]+://[^;]+;password=(?P<secret>[^;\\s]+)"
    replacement: "[REDACTED]"
    enabled: true

  - name: "oracle_connection"
    pattern: "(?i)(?:oracle|jdbc:oracle)://[^:\\s]+:(?P<secret>[^@\\s]+)@"
    replacement: "[REDACTED]"
    enabled: true

  - name: "mssql_connection"
    pattern: "(?i)jdbc:sqlserver://[^;]+;password=(?P<secret>[^;\\s]+)"
    replacement: "[REDACTED]"
    enabled: true

  # ─── Cloud provider tokens ─────────────────────────────────────────────────
  - name: "kubernetes_token"
    pattern: "(?i)BearerToken[ \\t]+(?P<secret>[A-Za-z0-9._-]+)"
    replacement: "[REDACTED]"
    enabled: true

  - name: "tanium_token"
    pattern: "token-[A-Za-z0-9._-]{20,}"
    replacement: "[REDACTED]"
    enabled: true

  - name: "datadog_api_key"
    pattern: "(?i)DD_API_KEY[ \\t]*[:=][ \\t]*(?P<secret>[a-f0-9]{32})"
    replacement: "[REDACTED]"
    enabled: true

  - name: "datadog_app_key"
    pattern: "(?i)DD_APP_KEY[ \\t]*[:=][ \\t]*(?P<secret>[a-f0-9]{40})"
    replacement: "[REDACTED]"
    enabled: true

  # ─── SaaS API keys ─────────────────────────────────────────────────────────
  - name: "stripe_live_key"
    pattern: "sk_live_[A-Za-z0-9]{24,}"
    replacement: "[REDACTED]"
