    enabled: true

  - name: "vault_approle_secret"
    pattern: "(?i)VAULT_APPROLE_SECRET_ID[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9-]{36})"
    replacement: "[REDACTED]"
    enabled: true

  # ─── Snowflake ─────────────────────────────────────────────────────────────
  - name: "snowflake_password"
    pattern: "(?i)snowflake[\\s_-]?(?:password|pwd)[ \\t]*[:=][ \\t]*(?P<secret>\\S+)"
