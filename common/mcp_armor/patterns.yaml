    replacement: "[REDACTED]"
    enabled: true

  - name: "env_cloud_secret"
    pattern: "(?i)^(?:AZURE_CLIENT_SECRET|AWS_SECRET_ACCESS_KEY|GCP_PRIVATE_KEY|PRIVATE_KEY)[ \\t]*=[ \\t]*(?P<secret>.+)"
    replacement: "[REDACTED]"
    enabled: true

  # ─── HashiCorp Vault ───────────────────────────────────────────────────────
  - name: "vault_token"
    pattern: "(?i)vault[\\s_-]?token[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9+/=]{20,})"
