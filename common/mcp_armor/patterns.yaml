  - name: "honeybadger_api_key"
    pattern: "(?i)honeybadger[\\s_-]?api[\\s_-]?key[ \\t]*[:=][ \\t]*(?P<secret>[a-f0-9]{20,})"
    replacement: "[REDACTED]"
    enabled: true

  # ─── Package registries ────────────────────────────────────────────────────
  - name: "nuget_api_key"
    pattern: "(?i)nuget[\\s_-]?api[\\s_-]?key[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9\\-]{20,})"
    replacement: "[REDACTED]"
    enabled: true

  - name: "rubygems_api_key"
    pattern: "(?i)rubygems[\\s_-]?api[\\s_-]?key[ \\t]*[:=][ \\t]*(?P<secret>[A-Za-z0-9\\-]{20,})"
    replacement: "[REDACTED]"
    enabled: true

  # ─── CDN ───────────────────────────────────────────────────────────────────
  - name: "cloudflare_api_key"
    pattern: "(?i)cloudflare[\\s_-]?api[\\s_-]?key[ \\t]*[:=][ \\t]*(?P<secret>[a-f0-9]{37})"
    replacement: "[REDACTED]"
